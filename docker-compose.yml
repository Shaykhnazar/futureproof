version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: futureproof_postgres
    environment:
      POSTGRES_USER: futureproof
      POSTGRES_PASSWORD: futureproof_dev_pass
      POSTGRES_DB: futureproof_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futureproof"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: futureproof_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment when ready to run the backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futureproof_api
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: go run cmd/server/main.go

volumes:
  postgres_data:
  redis_data:
